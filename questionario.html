<!DOCTYPE html>
<html>
<head>
  <title>Questionario</title>
</head>
<body style="font-family: Arial; padding: 50px; max-width: 600px; margin: auto;">

  <h2>Dicci come vuoi arredare la stanza</h2>

  <label>Che stanza vuoi arredare?</label><br>
  <select id="room">
    <option>Soggiorno</option>
    <option>Camera da letto</option>
    <option>Cucina</option>
  </select>

  <br><br>

  <label>Che stile preferisci?</label><br>
  <select id="style">
    <option>Moderno</option>
    <option>Elegante</option>
    <option>Economico funzionale</option>
  </select>

  <br><br>

  <label>Budget indicativo</label><br>
  <select id="budget">
    <option>Meno di 1.000 €</option>
    <option>1.000 - 2.500 €</option>
    <option>2.500 - 5.000 €</option>
    <option>Oltre 5.000 €</option>
  </select>

  <br><br>

  <label>Colori preferiti</label><br>
  <select id="colors">
    <option>Chiari</option>
    <option>Neutri</option>
    <option>Legno naturale</option>
    <option>Scuri</option>
  </select>

  <br><br>

  <button onclick="goResult()" style="padding: 12px 25px;">
    Genera proposta
  </button>

<script>
async function goResult() {

  const room = document.getElementById("room").value;
  const style = document.getElementById("style").value;
  const budget = document.getElementById("budget").value;
  const colors = document.getElementById("colors").value;

  const SUPABASE_URL = "https://pgttflwnuospwzwgrbrj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBndHRmbHdudW9zcHd6d2dyYnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTA1NTksImV4cCI6MjA5MzEyNjU1OX0.r_I9QlIcoeVezyXYNwsN6xPfmzNce7LG4OxZ9V0C27M";

  try {
    const response = await fetch(SUPABASE_URL + "/rest/v1/projects", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Prefer": "return=representation"
      },
      body: JSON.stringify({
        room: room,
        style: style,
        budget: budget,
        colors: colors
      })
    });

    const data = await response.text();

    if (!response.ok) {
      alert("Errore: " + data);
      return;
    }

    alert("Salvato!");
    window.location.href = "risultato.html";

  } catch (err) {
    alert("Errore JS: " + err.message);
  }
}
</script>
</body>
</html>
